    <!-- Content comes from Firestore; warming the connection early shaves
         ~400ms off the first data fetch. Image hosts get a cheap DNS warmup. -->
    <link
      rel="preconnect"
      href="https://firestore.googleapis.com"
      crossorigin
    />
    <link rel="dns-prefetch" href="https://opengraph.githubassets.com" />

    <!-- Mono is above the fold (nav eyebrow, hero terminal card); preload it so
         the terminal identity paints immediately instead of swapping in late. -->
    <link
      rel="preload"
      href="/fonts/jetbrains-mono-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

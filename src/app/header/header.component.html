<p-menubar
  [model]="items"
  styleClass="flex
   !border-none !w-full !fixed
   !top-0 !left-0 !z-50 !transition-all
!justify-between
     !duration-300 !rounded-none"
>
  <ng-template #start>
    <a
      href="#home"
      class="font-display text-xl font-bold text-blue-700 md:text-2xl"
    >
      connect<span class="text-amber-400">with</span>sandeepan
    </a>
  </ng-template>
  <ng-template #end>
    <div class="flex items-center gap-1">
      <p-button
        [icon]="themeService.darkMode() ? 'pi pi-sun' : 'pi pi-moon'"
        (onClick)="themeService.toggle()"
        text
        rounded
        severity="secondary"
        ariaLabel="Toggle dark mode"
      />
      <p-button label="View Resume" (onClick)="downloadResume()" text severity="info" />
    </div>
  </ng-template>
</p-menubar>

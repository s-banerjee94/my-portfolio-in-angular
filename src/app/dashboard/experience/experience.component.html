<p-card [header]="isEditMode ? 'Edit experience' : 'Add experience'">
  <form (ngSubmit)="onSubmit()" #experienceForm="ngForm" class="space-y-2">
    <div class="flex flex-col md:flex-row w-full gap-x-2 gap-y-2  items-center">
      <p-floatlabel variant="on" class="w-full md:basis-2/3">
        <input
          pInputText
          id="company_name_label"
          name="companyName"
          [(ngModel)]="companyName"
          required
          autocomplete="off"
          #companyNameField="ngModel"
          class="w-full md:basis-2/3"
        />
        <label for="company_name_label">Company Name</label>
      </p-floatlabel>
      <div class="flex w-full md:basis-1/3 items-center gap-2">
          <p-floatlabel variant="on" class="w-full">
            <input
              pInputText
              id="color_value"
              name="colorValue"
              [(ngModel)]="color"
              required
              autocomplete="off"
              class="w-full"
            />
            <label for="color_value">Color</label>
          </p-floatlabel>

        <div class="w-10 flex-none items-center">
          <p-colorpicker
            name="color"
            inputId="color_picker"
            required
            [(ngModel)]="color"
            #colorPicker="ngModel"
          ></p-colorpicker>
        </div>
      </div>

    </div>
    <p-floatlabel variant="on">
      <input
        pInputText
        id="jobProfile_label"
        name="jobProfile"
        [(ngModel)]="jobProfile"
        required
        autocomplete="off"
        fluid="true"
        #jobProfileField="ngModel"
      />
      <label for="jobProfile_label">Job Profile</label>
    </p-floatlabel>
    <p-floatlabel variant="on">
      <textarea
        pTextarea
        id="company_description_label"
        name="companyDescription"
        [(ngModel)]="description"
        rows="5"
        cols="30"
        [autoResize]="true"
        fluid="true"
        required
        minlength="25"
      ></textarea>
      <label for="company_description_label">Company Description</label>
    </p-floatlabel>
    <div class="flex w-full gap-x-2">
      <p-floatlabel variant="on" class="w-full">
        <p-datepicker
          [(ngModel)]="startDate"
          name="startDate"
          inputId="startDatePicker"
          required
          fluid="true"
          #startDatePicker="ngModel"
          dateFormat="dd/mm/yy"
        />
        <label for="startDatePicker">Start Date</label>
      </p-floatlabel>

      <p-floatlabel variant="on" class="w-full">
        <p-datepicker
          [(ngModel)]="endDate"
          name="endDate"
          inputId="endDatePicker"
          fluid="true"
          #endDatePicker="ngModel"
          dateFormat="dd/mm/yy"
        />
        <label for="endDatePicker">End Date</label>
      </p-floatlabel>
    </div>

    <div class="mt-4 flex gap-2">
      <p-button
        type="submit"
        [label]="isEditMode ? 'Update' : 'Save'"
        fluid="true"
        [disabled]="experienceForm.invalid"
      ></p-button>
      <p-button
        *ngIf="isEditMode"
        type="button"
        label="Cancel"
        severity="secondary"
        (onClick)="cancelEdit()"
      ></p-button>
    </div>
  </form>
</p-card>
<p-card header="List of Experience" styleClass="my-4">
  <div class="flex flex-col gap-y-2 ">
    @for (exp of experiences; track exp.id) {
      <p-panel [toggleable]="true" collapsed="true">
        <ng-template #header>
          <div class="flex items-center gap-2">
            <p-avatar icon="pi pi-briefcase" shape="circle"
                      [style]="{ 'background-color': exp.color, 'color': 'white'}"/>
            <span class="font-bold">{{ exp.companyName }}</span>
          </div>
        </ng-template>
        <ng-template #footer>
          <div class="flex justify-end gap-2">
            <p-button icon="pi pi-pencil" severity="info" [rounded]="true" [outlined]="true" (onClick)="editExp(exp)"/>
            <p-button icon="pi pi-trash" severity="warn" [rounded]="true" [outlined]="true"
                      (onClick)="deleteExp(exp.id)"/>
          </div>
        </ng-template>

        <span>
      {{ convertToDate(exp.startDate) | date:'dd/MM/yyyy' }} - {{ convertToDate(exp.endDate) |  date:'dd/MM/yyyy' }}
    </span>
        <p class="m-0">
          {{ exp.description }}
        </p>
      </p-panel>
    }
  </div>
</p-card>

<p-toast
  [showTransformOptions]="'translateY(100%)'"
  [showTransitionOptions]="'500ms'"
  [hideTransitionOptions]="'1000ms'"
/>

<header
  class="sticky top-0 z-50 border-b border-[var(--p-content-border-color)] bg-[color-mix(in_srgb,var(--site-ground)_86%,transparent)] backdrop-blur-md"
>
  <!-- Phones get two rows (logo + actions, then a scrollable nav strip);
       sm and up collapses back to the original single 56px row. -->
  <div
    class="container mx-auto flex flex-wrap items-center justify-between gap-x-4 px-4 sm:h-14 sm:flex-nowrap sm:px-6 lg:px-8"
  >
    <a
      routerLink="/admin"
      class="order-1 flex h-14 items-center font-mono text-base font-semibold"
    >
      ~/<span class="grad-text">sandeepan</span
      ><span class="text-muted-color">/admin</span>
    </a>

    <nav
      class="order-3 flex w-full items-center gap-1 overflow-x-auto pb-2 font-mono text-sm sm:order-2 sm:w-auto sm:overflow-visible sm:pb-0"
    >
      @for (item of navItems; track item.link) {
        <a
          [routerLink]="item.link"
          routerLinkActive="!text-primary"
          class="text-muted-color hover:text-primary rounded-md px-3 py-1.5 whitespace-nowrap transition-colors"
        >
          {{ item.label }}
        </a>
      }
      <a
        routerLink="/"
        class="text-muted-color hover:text-primary rounded-md px-3 py-1.5 whitespace-nowrap transition-colors sm:hidden"
      >
        view site ↗
      </a>
    </nav>

    <div class="order-2 flex h-14 items-center gap-2 sm:order-3">
      <a
        routerLink="/"
        class="text-muted-color hover:text-primary hidden font-mono text-sm transition-colors sm:inline"
      >
        view site ↗
      </a>
      @if (pushSupported) {
        <p-button
          [icon]="
            push.permission() === 'granted' ? 'pi pi-bell' : 'pi pi-bell-slash'
          "
          (onClick)="push.enable()"
          text
          rounded
          severity="secondary"
          ariaLabel="Notify this device about new messages"
        />
      }
      <p-button
        [icon]="themeService.darkMode() ? 'pi pi-sun' : 'pi pi-moon'"
        (onClick)="themeService.toggle()"
        text
        rounded
        severity="secondary"
        ariaLabel="Toggle dark mode"
      />
      <p-button
        label="Log out"
        icon="pi pi-sign-out"
        (onClick)="logout()"
        size="small"
        severity="danger"
        [outlined]="true"
      />
    </div>
  </div>
</header>

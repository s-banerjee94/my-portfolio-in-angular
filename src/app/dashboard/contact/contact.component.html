<div
  class="overflow-hidden rounded-xl border border-[var(--p-content-border-color)] bg-[var(--p-content-background)]"
>
  <div class="border-b border-[var(--p-content-border-color)] px-5 py-3">
    <p class="text-muted-color m-0 font-mono text-xs">
      // PUT /profile/contact — direct channels shown on the public site
    </p>
  </div>

  <div class="space-y-5 p-5 sm:p-6">
    <div class="grid gap-5 md:grid-cols-2">
      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-envelope"></i>
        </p-inputgroup-addon>
        <p-floatlabel variant="on">
          <input
            pInputText
            id="email_label"
            type="email"
            autocomplete="off"
            fluid="true"
            [(ngModel)]="contactDetails.email"
          />
          <label for="email_label">Email Address</label>
        </p-floatlabel>
      </p-inputgroup>

      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-github"></i>
        </p-inputgroup-addon>
        <p-floatlabel variant="on">
          <input
            pInputText
            id="gitHub_profile_URL_label"
            autocomplete="off"
            fluid="true"
            [(ngModel)]="contactDetails.github"
          />
          <label for="gitHub_profile_URL_label">GitHub Profile URL</label>
        </p-floatlabel>
      </p-inputgroup>

      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-linkedin"></i>
        </p-inputgroup-addon>
        <p-floatlabel variant="on">
          <input
            pInputText
            id="linkedIn_profile_URL_label"
            autocomplete="off"
            fluid="true"
            [(ngModel)]="contactDetails.linkedin"
          />
          <label for="linkedIn_profile_URL_label">LinkedIn Profile URL</label>
        </p-floatlabel>
      </p-inputgroup>

      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-twitter"></i>
        </p-inputgroup-addon>
        <p-floatlabel variant="on">
          <input
            pInputText
            id="twitter_profile_URL_label"
            autocomplete="off"
            fluid="true"
            [(ngModel)]="contactDetails.twitter"
          />
          <label for="twitter_profile_URL_label">Twitter Profile URL</label>
        </p-floatlabel>
      </p-inputgroup>

      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-instagram"></i>
        </p-inputgroup-addon>
        <p-floatlabel variant="on">
          <input
            pInputText
            id="instagram_profile_URL_label"
            autocomplete="off"
            fluid="true"
            [(ngModel)]="contactDetails.instagram"
          />
          <label for="instagram_profile_URL_label">Instagram Profile URL</label>
        </p-floatlabel>
      </p-inputgroup>
    </div>

    <p class="text-muted-color m-0 font-mono text-xs">
      // only filled-in channels appear on the site — leave the rest empty
    </p>

    <div class="flex justify-end">
      <p-button
        label="Save changes"
        styleClass="!border-0 !bg-[image:var(--site-grad)] !text-white hover:!brightness-110"
        (onClick)="saveContactDetails()"
      />
    </div>
  </div>
</div>

<p-toast
  [showTransformOptions]="'translateY(100%)'"
  [showTransitionOptions]="'1000ms'"
  [hideTransitionOptions]="'1000ms'"
  [showTransformOptions]="'translateX(100%)'"
/>

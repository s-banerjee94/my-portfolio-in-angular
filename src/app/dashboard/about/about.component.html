<p-card header="Edit About Section">
  <form #aboutForm="ngForm" (ngSubmit)="saveAboutDetails()">
    <div class="field">
      <label for="text">About Text</label>
      <p-editor [(ngModel)]="formData.text" id="text" name="text" [style]="{ height: '320px' }" required
                #textEditor="ngModel">
        <ng-template #header>
          <span class="ql-formats">
            <button type="button" class="ql-bold" aria-label="Bold"></button>
            <button type="button" class="ql-italic" aria-label="Italic"></button>
            <button
              type="button"
              class="ql-underline"
              aria-label="Underline"
            ></button>
            <button type="button" class="ql-color" aria-label="color"></button>
          </span>
        </ng-template>
      </p-editor>
    </div>

    <div class="my-4 flex flex-col gap-x-1 md:flex-row">
      <div>
        <p-floatlabel variant="on" class="mb-3 flex-1/3">
          <input
            pInputText
            id="experience_label"
            name="experience"
            [(ngModel)]="formData.experience"
            #experienceInput="ngModel"
            required
            autocomplete="off"
            fluid="true"
          />
          <label for="experience_label">Experience</label>
        </p-floatlabel>
        @if (experienceInput.invalid && experienceInput.dirty && experienceInput.touched) {
          <p-message severity="error" variant="simple" size="small"> Experience is required </p-message>
        }
      </div>

      <p-floatlabel variant="on" class="mb-3 flex-1/3">
        <input
          pInputText
          id="education_label"
          name="education"
          [(ngModel)]="formData.education"
          #educationInput="ngModel"
          required
          autocomplete="off"
          fluid="true"
        />
        <label for="education_label">Education</label>
        <small *ngIf="educationInput.invalid && (educationInput.dirty || educationInput.touched)" class="p-error">
          Education is required
        </small>
      </p-floatlabel>
      <p-floatlabel variant="on" class="mb-3 flex-1/3">
        <input
          pInputText
          id="certification_label"
          name="certification"
          [(ngModel)]="formData.certification"
          #certificationInput="ngModel"
          autocomplete="off"
          fluid="true"
        />
        <label for="certification_label">Certification</label>
        <small *ngIf="certificationInput.invalid && (certificationInput.dirty || certificationInput.touched)"
               class="p-error">
          Certification is required
        </small>
      </p-floatlabel>
    </div>
    <p-card header="Skills">
      @for (skill of formData.skills; track skill) {
        <p-chip
          [label]="skill"
          [removable]="true"
          (onRemove)="removeSkill(skill)"
          styleClass
        />
      }
      <p-floatlabel variant="on" class="my-3 flex-1/3">
        <input
          pInputText
          id="add_skills_label"
          name="enteredSkill"
          [(ngModel)]="enteredSkill"
          (keydown.enter)="addSkill($event)"
          autocomplete="off"
          fluid="true"
        />
        <label for="add_skills_label">Add Skills</label>
      </p-floatlabel>
    </p-card>
    <div class="mt-3 flex justify-end">
      <p-button type="submit" label="Submit" [disabled]="aboutForm.invalid || !formData.skills.length"/>
    </div>
  </form>
</p-card>

<p-toast
  [showTransformOptions]="'translateY(100%)'"
  [showTransitionOptions]="'500ms'"
  [hideTransitionOptions]="'1000ms'"
/>

<section
  id="home"
  class="relative overflow-hidden border-b border-[var(--p-content-border-color)]"
>
  <div class="hero-grid absolute inset-0" aria-hidden="true"></div>
  <div class="blob blob-1" aria-hidden="true"></div>
  <div class="blob blob-2" aria-hidden="true"></div>

  <div
    class="relative z-10 container mx-auto grid grid-cols-1 items-center gap-12 px-4 pt-28 pb-16 sm:px-6 lg:grid-cols-[1.05fr_0.95fr] lg:px-8 lg:pt-36 lg:pb-20"
  >
    <div>
      @if (heroData.statusBadge) {
        <span
          class="text-muted-color mb-6 inline-flex items-center gap-2 rounded-full border border-[var(--p-content-border-color)] bg-[var(--p-content-background)] px-3 py-1 text-sm"
        >
          <span class="status-dot" aria-hidden="true"></span>
          {{ heroData.statusBadge }}
        </span>
      }

      <p class="text-muted-color mb-3 font-mono text-sm">$ whoami</p>

      <h1
        class="font-display mb-3 text-4xl font-semibold text-balance md:text-5xl lg:text-6xl"
      >
        {{ heroData.name }}
      </h1>

      <h2 class="font-display grad-text mb-6 text-2xl italic md:text-3xl">
        {{ heroData.professionalTitle }}
      </h2>

      <p class="text-muted-color mb-8 max-w-lg">
        {{ heroData.description }}
      </p>

      <div class="mb-8 flex flex-col gap-4 sm:flex-row">
        <p-button
          label="View projects"
          (onClick)="navigateToProjects()"
          styleClass="!border-0 !bg-[image:var(--site-grad)] !text-white hover:!brightness-110"
        />
        <p-button
          label="Contact me"
          [outlined]="true"
          severity="secondary"
          (onClick)="navigateToContact()"
        />
      </div>

      <div class="flex gap-5 font-mono text-sm">
        @if (heroData.githubUrl) {
          <a
            class="social-link"
            [href]="heroData.githubUrl"
            target="_blank"
            rel="noopener"
            >github</a
          >
        }
        @if (heroData.linkedInUrl) {
          <a
            class="social-link"
            [href]="heroData.linkedInUrl"
            target="_blank"
            rel="noopener"
            >linkedin</a
          >
        }
        @if (heroData.email) {
          <a class="social-link" [href]="'mailto:' + heroData.email">email</a>
        }
      </div>
    </div>

    <app-api-status-card
      [name]="heroData.name || 'Sandeepan Banerjee'"
      [role]="heroData.professionalTitle || 'full-stack developer'"
    />
  </div>
</section>

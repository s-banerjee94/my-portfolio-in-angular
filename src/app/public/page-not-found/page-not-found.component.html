<div
  class="flex min-h-dvh flex-col items-center justify-center gap-8 px-6 py-24 text-center"
>
  <!-- 404 as an API response, in the site's terminal language -->
  <div
    class="w-full max-w-lg overflow-hidden rounded-xl border border-[var(--p-content-border-color)] bg-[var(--site-code-bg)] text-left shadow-[var(--site-glow)]"
  >
    <div
      class="flex items-center justify-between border-b border-white/[0.07] px-4 py-2.5"
    >
      <span class="font-mono text-xs text-[var(--site-code-muted)]"
        >GET {{ path }}</span
      >
      <span class="font-mono text-xs text-[var(--site-code-muted)]"
        >HTTP/2</span
      >
    </div>
    <div class="px-5 py-6 font-mono text-sm">
      <p class="m-0 break-all text-[var(--site-code-muted)]">
        <span class="text-[var(--site-code-key)]">$</span> curl -s
        https://connectwithsandeepan.in{{ path }}
      </p>
      <p class="mt-3 mb-0 text-[var(--site-code-text)]">
        HTTP/2 <b class="text-[var(--site-code-key)]">404</b> · Not Found
      </p>
      <p class="mt-4 mb-0 text-[var(--site-code-muted)]">
        // this route doesn't exist on the server
      </p>
    </div>
  </div>

  <div class="flex flex-col items-center gap-3">
    <h1 class="font-display text-3xl font-semibold md:text-4xl">
      Page not found
    </h1>
    <p class="text-muted-color max-w-md">
      The page you're looking for moved or never existed. Let's get you back to
      solid ground.
    </p>
  </div>

  <a
    routerLink="/"
    class="inline-flex items-center gap-2 rounded-md bg-[image:var(--site-grad)] px-5 py-2.5 font-mono text-sm font-semibold text-white transition hover:brightness-110"
  >
    cd ~ &rarr;
  </a>
</div>

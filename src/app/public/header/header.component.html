<p-menubar
  [model]="items"
  [pt]="menubarPt"
  styleClass="!fixed !top-0 !left-0 !z-50 !w-full !rounded-none !border-0 !border-b !border-solid !border-[var(--p-content-border-color)] !bg-[color-mix(in_srgb,var(--site-ground)_86%,transparent)] !backdrop-blur-md !transition-colors !duration-300"
>
  <ng-template #start>
    <a href="#home" class="font-mono text-lg font-semibold">
      ~/<span class="grad-text">sandeepan</span>
    </a>
  </ng-template>
  <ng-template #end>
    <div class="flex items-center gap-2">
      <p-button
        [icon]="themeService.darkMode() ? 'pi pi-sun' : 'pi pi-moon'"
        (onClick)="themeService.toggle()"
        text
        rounded
        severity="secondary"
        ariaLabel="Toggle dark mode"
      />
      <p-button
        label="Résumé"
        icon="pi pi-download"
        (onClick)="downloadResume()"
        styleClass="!border-0 !bg-[image:var(--site-grad)] !text-white hover:!brightness-110"
      />
    </div>
  </ng-template>
</p-menubar>

<!-- reading-progress bar, sits on the top edge above the menubar -->
<div
  class="grad-bg fixed top-0 left-0 z-[60] h-[3px]"
  [style.width.%]="scrollProgress()"
  aria-hidden="true"
></div>

<!-- Mobile/tablet nav: the menubar hamburger is hidden below its 960px
     breakpoint and this thumb-reachable speed dial takes over. -->
<div class="fixed right-5 bottom-5 z-40 min-[960px]:hidden">
  <p-speeddial
    [model]="dialItems"
    direction="up"
    [mask]="true"
    [transitionDelay]="40"
    ariaLabel="Section navigation"
    [buttonProps]="{ rounded: true, ariaLabel: 'Open section navigation' }"
    buttonClassName="!h-12 !w-12 !border-0 !bg-[image:var(--site-grad)] !text-white !shadow-lg"
    [pt]="dialPt"
  >
    <ng-template #item let-item let-toggleCallback="toggleCallback">
      <button
        type="button"
        class="pointer-events-auto flex cursor-pointer items-center gap-3 border-0 bg-transparent p-0"
        (click)="toggleCallback($event, item)"
      >
        <span
          class="rounded-lg border border-[var(--p-content-border-color)] bg-[var(--p-content-background)] px-3 py-1.5 font-mono text-xs shadow-md"
          >{{ item.label }}</span
        >
        <span
          class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full border border-[var(--p-content-border-color)] bg-[var(--p-content-background)] shadow-md"
        >
          <i [class]="item.icon + ' text-sm'"></i>
        </span>
      </button>
    </ng-template>
  </p-speeddial>
</div>
